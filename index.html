<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SITEVAULT | Research Desk 2.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --accent: #e67e22; 
            --blueprint: #2c3e50; 
            --dark: #1a1a1a; 
            --panel: #252525;
            --text: #ececec;
            --map-light: #f8f9fa;
            --sidebar-width: 300px;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: white; color: #333; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* NAVIGATION */
        nav { background: #111; height: 60px; display: none; justify-content: space-between; align-items: center; padding: 0 30px; border-bottom: 2px solid var(--accent); z-index: 2000; color: white; }
        .nav-btns { display: flex; height: 100%; }
        .nav-tab { background: transparent; border: none; color: #888; padding: 0 20px; font-size: 11px; font-weight: bold; cursor: pointer; letter-spacing: 1px; transition: 0.2s; border-bottom: 3px solid transparent; }
        .nav-tab:hover { color: var(--accent); }
        .active-tab { color: white !important; border-bottom: 3px solid var(--accent) !important; background: rgba(230,126,34,0.05); }

        /* APP LAYOUT */
        .app-container { display: none; height: calc(100vh - 60px); width: 100%; }
        .sidebar { width: var(--sidebar-width); background: var(--panel); border-right: 1px solid #333; color: white; padding: 25px; display: flex; flex-direction: column; gap: 25px; flex-shrink: 0; overflow-y: auto; }
        .main-content { flex-grow: 1; position: relative; overflow-y: auto; background: var(--map-light); }
        .page { display: none; width: 100%; height: 100%; }
        
        #page-landing { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 9999; background: var(--blueprint); background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 30px 30px; display: flex; align-items: center; justify-content: center; text-align: center; }

        #map { width: 100%; height: 100%; background: var(--map-light); }
        label { font-size: 10px; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select, textarea { background: #111; border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; font-size: 12px; width: 100%; box-sizing: border-box; }
        
        button.primary { background: var(--accent); color: white; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #ccc; margin-top: 8px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid white; }

        /* POPUP STYLING */
        .leaflet-popup-content-wrapper { background: #1a1a1a; color: white; border-radius: 0; border-left: 4px solid var(--accent); }
        .leaflet-popup-tip { background: #1a1a1a; }
        .popup-tag { font-size: 9px; background: var(--accent); color: white; padding: 2px 5px; font-weight: bold; text-transform: uppercase; }

        /* ANALYSIS PAPER */
        .paper { background: white; color: #333; max-width: 850px; margin: 40px auto; min-height: 80vh; padding: 60px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-top: 10px solid var(--dark); position: relative; }
        .ext-link { display: inline-block; padding: 8px 12px; background: #f0f0f0; border-radius: 4px; text-decoration: none; color: var(--blueprint); font-weight: bold; font-size: 11px; margin-right: 10px; border: 1px solid #ddd; }
        .ext-link:hover { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div id="page-landing">
    <div style="max-width: 800px; padding: 60px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); color: white;">
        <h1 style="font-size: 4rem; margin: 0; letter-spacing: -3px; line-height: 0.9;">SITEVAULT</h1>
        <p style="color: var(--accent); letter-spacing: 5px; font-size: 12px; margin: 15px 0 40px 0; font-weight: bold;">PRECEDENT ANALYSIS ENGINE</p>
        <button onclick="enterApp()" class="primary">Initialize Access Portal</button>
    </div>
</div>

<nav id="main-nav">
    <div style="display: flex; align-items: center; gap: 20px; padding-left:20px;">
        <span style="font-weight: 900; letter-spacing: 2px; color:white;">RESEARCH<span style="color:var(--accent)">DESK</span></span>
        <div class="nav-btns">
            <button id="btn-map" class="nav-tab" onclick="showPage('map')">SPATIAL MAP</button>
            <button id="btn-dossier" class="nav-tab" onclick="showPage('dossier')">PRECEDENT DATABASE</button>
            <button id="btn-analysis" class="nav-tab" onclick="showPage('analysis')">SITE ANALYSIS</button>
        </div>
    </div>
</nav>

<div id="app-wrapper" class="app-container">
    <aside class="sidebar">
        <div id="sidebar-map" class="sidebar-content">
            <h3 style="font-size: 11px; color: var(--accent); letter-spacing: 2px;">MAP OVERVIEW</h3>
            
            <label>Toggle Dataset Visibility</label>
            <select id="dataset-selector" onchange="renderPins(this.value)">
                <option value="all">View Entire Collection</option>
                <option value="churches">Ecclesiastical Records</option>
                <option value="museums">Museum Records</option>
            </select>

            <section style="margin-top:20px;">
                <label>Legend</label>
                <div class="legend-item"><div class="dot" style="background:#e67e22;"></div> Church Data</div>
                <div class="legend-item"><div class="dot" style="background:#3498db;"></div> Museum Data</div>
            </section>
        </div>

        <div id="sidebar-dossier" class="sidebar-content" style="display:none;">
            <h3 style="font-size: 11px; color: var(--accent); letter-spacing: 2px;">COLLECTION TOOLS</h3>
            
            <label>Filter By Typology</label>
            <select id="bucket-filter" onchange="filterDatabaseView(this.value)">
                <option value="all">All Precedents</option>
                <option value="Cistercian">Cistercian</option>
                <option value="Benedictine">Benedictine</option>
                <option value="Modernist">Modernist</option>
                <option value="Latin Mass">Latin Mass</option>
                <option value="Reuse">Reuse</option>
                <option value="Parish">Parish</option>
                <option value="Historic">Historic Ruins</option>
            </select>

            <div style="margin-top:30px; padding-top:20px; border-top:1px solid #444;">
                <label>Manual Intake</label>
                <input type="text" id="in-name" placeholder="Site Name" style="margin-bottom:5px;">
                <div style="display:flex; gap:5px; margin-bottom:5px;">
                    <input type="text" id="in-lat" placeholder="Lat">
                    <input type="text" id="in-lng" placeholder="Lng">
                </div>
                <input type="text" id="in-notes" placeholder="Initial Notes" style="margin-bottom:10px;">
                <button onclick="commitSite()" style="width:100%; background:var(--accent); border:none; color:white; padding:10px; font-weight:bold; cursor:pointer;">+ ADD TO DATABASE</button>
            </div>

            <div style="margin-top:20px;">
                <label>Discovery Agent</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="agent-input" placeholder="Discovery URL...">
                    <button onclick="runAgent()" style="background:#444; border:none; color:white; padding:0 10px; cursor:pointer;">SCAN</button>
                </div>
                <div id="inbox" style="margin-top:10px;"></div>
            </div>
        </div>

        <div id="sidebar-analysis" class="sidebar-content" style="display:none;">
            <h3 style="font-size: 11px; color: var(--accent); letter-spacing: 2px;">REPORTING</h3>
            <label>Load Research Subject</label>
            <select id="analysis-selector" onchange="runAnalysis(this.value)">
                <option value="">-- Start New Draft --</option>
            </select>
            <button onclick="window.print()" style="margin-top:20px; width:100%; background:#444; border:none; color:white; padding:10px; font-weight:bold; cursor:pointer;">PRINT REPORT</button>
        </div>
    </aside>

    <main class="main-content">
        <div id="page-map" class="page"><div id="map"></div></div>

        <div id="page-dossier" class="page" style="background:#1a1a1a; padding:40px; overflow-y:auto;">
            <div id="db-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;"></div>
        </div>

        <div id="page-analysis" class="page" style="background:#eee; overflow-y:auto;">
            <div class="paper">
                <div id="analysis-content">
                    <h1 style="border-bottom: 2px solid var(--accent); color: var(--blueprint); margin-bottom: 5px;">Technical Site Analysis</h1>
                    <span id="sync-status" style="font-size: 10px; color: #e67e22; font-weight: bold; letter-spacing: 2px;">DRAFT STATUS: ACTIVE</span>
                    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                        <div>
                            <label>Primary Subject</label>
                            <input type="text" id="ana-name" placeholder="Unspecified Site" style="background:transparent; border:none; border-bottom:1px solid #ccc; color:#333; font-size:20px; font-weight:bold; padding:5px 0;">
                        </div>
                        <div>
                            <label>Geospatial Ref</label>
                            <div id="ana-coords" style="font-size: 14px; font-family: monospace; padding-top:10px;">0.0000 / 0.0000</div>
                        </div>
                    </div>

                    <label>External Research Modules</label>
                    <div style="margin-bottom:30px; margin-top:10px;">
                        <a href="https://www.landdirect.ie" target="_blank" class="ext-link">Land Registry (LandDirect)</a>
                        <a href="https://www.gsi.ie" target="_blank" class="ext-link">Geological Survey Ireland</a>
                        <a href="https://www.buildingsofireland.ie" target="_blank" class="ext-link">NIAH Database</a>
                    </div>

                    <label>Structural Observations</label>
                    <textarea id="ana-notes" style="width:100%; height:350px; border:1px solid #eee; padding:15px; font-family:serif; line-height:1.6; font-size:16px; color:#444; margin-top:10px;" placeholder="Enter field notes or sync from database..."></textarea>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, churches = [], museums = [], allSites = [];

    async function loadExternalDatabase() {
        try {
            const response = await fetch('database.json');
            const data = await response.json();
            churches = data.churches || [];
            museums = data.museums || [];
            allSites = [...churches, ...museums];
            
            renderPins('all');
            renderDatabaseGrid(allSites);
            updateAnalysisList();
        } catch (e) { console.warn("No database.json found."); }
    }

    function enterApp() {
        document.getElementById('page-landing').style.display = 'none';
        document.getElementById('main-nav').style.display = 'flex';
        document.getElementById('app-wrapper').style.display = 'flex';
        initMap();
        showPage('map');
        loadExternalDatabase();
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.sidebar-content').forEach(s => s.style.display = 'none');
        document.getElementById('page-' + id).style.display = 'block';
        document.getElementById('sidebar-' + id).style.display = 'block';
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active-tab'));
        document.getElementById('btn-' + id).classList.add('active-tab');
        if(id === 'map' && map) setTimeout(() => map.invalidateSize(), 200);
    }

    function initMap() {
        if (map) return;
        map = L.map('map').setView([53.4, -7.8], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
    }

    function renderPins(mode = 'all') {
        if(!map) return;
        map.eachLayer(l => { if(l instanceof L.CircleMarker) map.removeLayer(l); });

        let list = [];
        if(mode === 'all') list = allSites;
        if(mode === 'churches') list = churches;
        if(mode === 'museums') list = museums;

        list.forEach(s => {
            let color = s.id > 200 ? '#3498db' : '#e67e22';
            let significance = s.notes || s.sign || "Historical significance pending field review.";
            
            // Image handling (assumes images are named by site id in an 'images/' folder)
            let imgTag = s.hasImage ? `<img src="images/${s.id}.jpg" style="width:100%; margin-top:10px; border:1px solid #444;">` : "";

            let popupContent = `
                <div style="min-width:200px;">
                    <span class="popup-tag">${s.bucket}</span>
                    <h3 style="margin:10px 0 5px 0; color:white;">${s.name}</h3>
                    <p style="font-size:11px; line-height:1.4; color:#bbb; margin:0;">${significance}</p>
                    ${imgTag}
                </div>
            `;

            L.circleMarker(s.coords, { 
                radius: 6, 
                color: '#fff', 
                weight: 1, 
                fillColor: color, 
                fillOpacity: 0.9 
            }).addTo(map).bindPopup(popupContent);
        });
    }

    function renderDatabaseGrid(data) {
        const grid = document.getElementById('db-grid');
        grid.innerHTML = '';
        data.forEach(s => {
            const card = document.createElement('div');
            card.style = "background:#252525; border-left:4px solid var(--accent); padding:20px; color:#aaa; font-size:12px;";
            card.innerHTML = `<strong style="color:white; font-size:14px; display:block; margin-bottom:5px;">${s.name}</strong>
                              <span style="background:#444; color:white; padding:2px 6px; border-radius:3px; font-size:9px;">${s.bucket.toUpperCase()}</span>
                              <p style="margin-top:10px; line-height:1.4;">${s.notes || s.sign || "Awaiting detail."}</p>`;
            grid.appendChild(card);
        });
    }

    function filterDatabaseView(type) {
        if (type === "all") {
            renderDatabaseGrid(allSites);
        } else {
            const filtered = allSites.filter(s => s.bucket === type);
            renderDatabaseGrid(filtered);
        }
    }

    function updateAnalysisList() {
        const sel = document.getElementById('analysis-selector');
        sel.innerHTML = '<option value="">-- Start New Draft --</option>';
        allSites.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.id; opt.innerText = s.name;
            sel.appendChild(opt);
        });
    }

    function runAnalysis(id) {
        if(!id) {
            document.getElementById('sync-status').innerText = "DRAFT STATUS: ACTIVE";
            document.getElementById('ana-name').value = "";
            document.getElementById('ana-coords').innerText = "0.0000 / 0.0000";
            document.getElementById('ana-notes').value = "";
            return;
        }
        const site = allSites.find(s => s.id == id);
        document.getElementById('sync-status').innerText = "SYNCED WITH DB: " + site.id;
        document.getElementById('ana-name').value = site.name;
        document.getElementById('ana-coords').innerText = site.coords.join(' / ');
        document.getElementById('ana-notes').value = site.notes || site.sign || "";
    }

    function commitSite() {
        const name = document.getElementById('in-name').value;
        const lat = parseFloat(document.getElementById('in-lat').value);
        const lng = parseFloat(document.getElementById('in-lng').value);
        if(!name || isNaN(lat)) return alert("Data incomplete.");
        const nSite = { id: Date.now(), name, coords: [lat, lng], bucket: "Manual", notes: document.getElementById('in-notes').value };
        allSites.push(nSite);
        churches.push(nSite); // Defaults new site to church category for toggle logic
        renderPins('all');
        renderDatabaseGrid(allSites);
        updateAnalysisList();
        alert("Committed to session.");
    }

    function runAgent() {
        const url = document.getElementById('agent-input').value;
        if(!url) return;
        const card = document.createElement('div');
        card.style = "background:#111; border:1px solid #444; padding:10px; font-size:10px; margin-top:10px; border-top:2px solid var(--accent); color:white;";
        card.innerHTML = `DISCOVERED: ${url.split('/').pop()}<br><button onclick="approveSite(); this.parentElement.remove();" style="font-size:9px; background:green; color:white; border:none; cursor:pointer; margin-top:5px; padding:3px 8px;">ADD</button>`;
        document.getElementById('inbox').prepend(card);
    }

    function approveSite() {
        const id = Date.now();
        allSites.push({ id, name: "Discovered " + id, coords: [53.3, -6.2], bucket: "Scraped", notes: "Awaiting review." });
        renderPins('all');
        renderDatabaseGrid(allSites);
        updateAnalysisList();
    }
</script>
</body>
</html>
